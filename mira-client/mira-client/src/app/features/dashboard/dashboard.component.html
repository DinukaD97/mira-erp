<div class="dashboard">
  <div class="page-header">
    <h1>Dashboard</h1>
    <p>Welcome back, Mira ERP</p>
  </div>

  <div class="cards-grid">
    @for (card of cards; track card.title) {
      <div class="summary-card" [style.border-left-color]="card.color">
        <div class="card-icon" [style.background]="card.background">
          <mat-icon [style.color]="card.color">{{ card.icon }}</mat-icon>
        </div>
        <div class="card-info">
          <span class="card-title">{{ card.title }}</span>
          <span class="card-value" [style.color]="card.color">{{ card.value }}</span>
        </div>
      </div>
    }
  </div>
</div>
